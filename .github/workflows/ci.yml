name: ci

# Device-free gates that guard the contract on every push/PR — no GPU runner
# needed. The 44-test GPU property suite + the blind confirmatories remain the
# hardware-side gates (run manually on rented/home silicon); these two jobs
# make the parts that CAN run on free runners run automatically, so an external
# contributor or confirmatory-filer can't silently break the contract or the
# projection anchors.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  anchor-gate:
    # R1: the projection model must reproduce the published flagship rows.
    # Pure stdlib — no torch/triton — so it's fast and can never bit-rot silently.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: projection anchor gate
        run: cd projections && python test_anchors.py

  interp-contract:
    # Triton interpreter-mode (CPU) contract + fuzz suite: kernel SEMANTICS,
    # nibble order, boundary/adversarial shapes — validated with no GPU and no
    # bitsandbytes (pure-torch NF4 packer as fixture oracle).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install CPU torch + triton
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --quiet triton pytest numpy
      - name: interpreter-mode contract + fuzz
        env:
          TRITON_INTERPRET: "1"
        run: cd kernel && python -m pytest test_interp_contract.py -q

      - name: README CPU quickstart (executed) + CPU refusal guard
        run: cd kernel && python -m pytest test_readme_cpu_block.py test_cpu_refusal.py -q

  wheel-smoke:
    # Built-artifact gate: the README's promised import surface must equal the
    # wheel's importable surface (scripts/wheel_smoke.py is the hardcoded
    # mirror of the Install comment). Runs from /tmp so imports resolve from
    # the installed wheel, never the repo tree. Plus the link check with the
    # release tag mapped to main (the tag exists only at release time).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build
        run: |
          python -m pip install --quiet --upgrade pip build
          python -m build
      - name: install wheel into clean venv
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl \
            torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: import battery + CPU micros (from the wheel)
        run: |
          cp scripts/wheel_smoke.py /tmp/
          cd /tmp && ./venv/bin/python wheel_smoke.py
      - name: README link check (tag mapped to this tree pre-release)
        # map to the PR head / pushed SHA, not main — a PR that ADDS a
        # README-linked file must validate against its own tree (Bugbot,
        # e4b PR #31; same job pattern here).
        run: |
          TAG=$(python -c "import tomllib; print('v'+tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          REF="${{ github.event.pull_request.head.sha || github.sha }}"
          python scripts/check_readme_links.py --map-ref "$TAG" "$REF"
