name: ci

# Device-free gates that guard the contract on every push/PR — no GPU runner
# needed. The 44-test GPU property suite + the blind confirmatories remain the
# hardware-side gates (run manually on rented/home silicon); these two jobs
# make the parts that CAN run on free runners run automatically, so an external
# contributor or confirmatory-filer can't silently break the contract or the
# projection anchors.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  anchor-gate:
    # R1: the projection model must reproduce the published flagship rows.
    # Pure stdlib — no torch/triton — so it's fast and can never bit-rot silently.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: projection anchor gate
        run: cd projections && python test_anchors.py

  interp-contract:
    # Triton interpreter-mode (CPU) contract + fuzz suite: kernel SEMANTICS,
    # nibble order, boundary/adversarial shapes — validated with no GPU and no
    # bitsandbytes (pure-torch NF4 packer as fixture oracle).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install CPU torch + triton
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --quiet triton pytest numpy
      - name: interpreter-mode contract + fuzz
        env:
          TRITON_INTERPRET: "1"
        run: cd kernel && python -m pytest test_interp_contract.py -q
