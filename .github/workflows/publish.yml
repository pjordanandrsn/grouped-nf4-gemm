name: publish

# Trusted publishing (PEP 740 attestations, no tokens anywhere): fires when a
# GitHub release is published. Requires the operator-side pending publisher on
# PyPI (project grouped-nf4-gemm, owner pjordanandrsn, repo grouped-nf4-gemm,
# workflow publish.yml, environment pypi) and the `pypi` environment in repo
# settings. Does not touch ci.yml.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build sdist + wheel
        run: |
          python -m pip install --quiet --upgrade build
          python -m build
      - name: built-artifact smoke (blocks publish)
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl \
            torch --extra-index-url https://download.pytorch.org/whl/cpu
          cp scripts/wheel_smoke.py /tmp/
          cd /tmp && ./venv/bin/python wheel_smoke.py
      - name: README link check (real tag URLs — the release exists now)
        run: python scripts/check_readme_links.py
      - name: publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
